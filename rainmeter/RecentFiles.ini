[Rainmeter]
Update=60000
DynamicWindowSize=1
BackgroundMode=2
SolidColor=00000000

[Variables]
FontFace=Segoe UI

[FetchRecent]
Measure=WebParser
URL=http://127.0.0.1:8082/api/rainmeter
UpdateRate=120
RegExp=(?s)^(.*)$
FinishAction=[!UpdateMeter TextRecent][!Redraw]

[ValRecent]
Measure=WebParser
URL=[FetchRecent]
StringIndex=1

[BG]
Meter=Shape
Shape=Rectangle 0,0,420,52,10 | Fill Color 8,13,26,230 | StrokeWidth 1 | Stroke Color 30,45,69,255
LeftMouseUpAction=["http://localhost:8082/recent-files.html"]
ToolTipText=Recent Files — click to open dashboard

[Icon]
Meter=String
Text=📂
X=12
Y=14
FontSize=18
Antialias=1

[TextRecent]
Meter=String
MeasureName=ValRecent
X=42
Y=10
W=370
H=36
FontFace=#FontFace#
FontSize=11
FontColor=E2EAF4
FontWeight=600
Antialias=1
DWrite=1
StringAlign=Left
ClipString=2
LeftMouseUpAction=["http://localhost:8082/recent-files.html"]