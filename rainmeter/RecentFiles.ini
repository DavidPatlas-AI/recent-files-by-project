[Rainmeter]
Update=1000
DynamicWindowSize=1
BackgroundMode=2
SolidColor=00000000

[Variables]
FontFace=Segoe UI
W=440

[FetchRecent]
Measure=WebParser
URL=http://127.0.0.1:8082/api/rainmeter
UpdateRate=120
RegExp=(?s)^(.*)$
FinishAction=[!UpdateMeterGroup RecentGroup][!Redraw]

[ValRecent]
Measure=WebParser
URL=[FetchRecent]
StringIndex=1

[BG]
Meter=Shape
Shape=Rectangle 0,0,440,56,12 | Fill Color 8,13,26,235 | StrokeWidth 1 | Stroke Color 42,42,106,255
Group=RecentGroup
LeftMouseUpAction=["http://localhost:8082/recent-files.html"]
RightMouseUpAction=[!Refresh]
ToolTipText=Recent files — click to open | right-click refresh

[BGGlow]
Meter=Shape
Shape=Rectangle 1,1,438,54,11 | Fill Color 0,0,0,0 | StrokeWidth 1 | Stroke Color 85,85,170,64
Group=RecentGroup

[Icon]
Meter=String
Text=📂
X=400
Y=16
FontSize=16
Antialias=1
Group=RecentGroup

[LabelTitle]
Meter=String
Text=קבצים אחרונים
X=380
Y=8
FontFace=#FontFace#
FontSize=9
FontColor=7D8FA6
FontWeight=600
Antialias=1
DWrite=1
StringAlign=Right
Group=RecentGroup

[TextRecent]
Meter=String
MeasureName=ValRecent
X=380
Y=24
W=360
H=28
FontFace=#FontFace#
FontSize=11
FontColor=E2EAF4
FontWeight=600
Antialias=1
DWrite=1
StringAlign=Right
ClipString=2
Group=RecentGroup
LeftMouseUpAction=["http://localhost:8082/recent-files.html"]